x-rack: &rack
  image: 18xx_rack:dev
  environment:
    DATABASE_URL: postgres://root:password@db:5432/18xx_development
    RACK_ENV: development
    RUBYOPT: --yjit
    OPAL_PREFORK_DISABLE: "true"
    DB_LOG_LEVEL: fatal
    BUNDLE_APP_CONFIG: /usr/local/bundle
  build:
    args:
      RACK_ENV: development
    dockerfile: ${DEV_DOCKERFILE:-Dockerfile}
  volumes:
    - .:/18xx:z
    # CHANGED: Switched to named volumes so memory is shared and preserved
    - rack_vendor:/18xx/vendor   
    - rack_bundle:/18xx/.bundle  
    - /18xx/desktop-shell  # Anonymous volume: Masks the heavy desktop folder from being indexed

services:
  rack:
    <<: *rack
    ports:
      - 9292:9292

  queue:
    <<: *rack
    command: bundle exec ruby queue.rb

db:
environment:
POSTGRES_USER: root
POSTGRES_PASSWORD: password
POSTGRES_DB: 18xx_development
build:
dockerfile: ${DEV_DOCKERFILE:-Dockerfile}

# NEW: Explicitly define the shared data volumes at the bottom of the file
volumes:
  rack_vendor:
  rack_bundle: