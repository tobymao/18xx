<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18xx Tournament Console</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/normalize.css@8.0.1/normalize.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap">
    <link rel="stylesheet" href="/assets/main.css">
    <style>
        body {
            font-family: 'Lato', sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            margin: 0;
            padding: 20px;
        }
        #launcher-view {
            max-width: 500px;
            margin: 50px auto;
            background: #252538;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #a6adc8;
        }
        select, input[type="text"] {
            width: 100%;
            padding: 10px;
            background: #11111b;
            border: 1px solid #45475a;
            color: #cdd6f4;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #a6e3a1;
            border: none;
            color: #11111b;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #94e2d5;
        }
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #1e1e2e;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.3s ease;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <div id="launcher-view" style="display: none;">
        <h2>18xx Tournament Setup Wizard</h2>
        <div class="form-group">
            <label for="game-type">Select Engine Variant</label>
            <select id="game-type">
                <option value="G1835">1835 (Standard Variant)</option>
            </select>
        </div>
        <div class="form-group">
            <label for="player-list">Registered Competitors (Comma Separated)</label>
            <input type="text" id="player-list" value="Stefan, Player 2, Player 3">
        </div>
        <button id="btn-launch">Initialize Engine Cluster</button>
    </div>

    <div id="game-view" style="display: none;">
        <div id="loading-screen">Hydrating Engine View Context...</div>
        <div id="app"></div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        const urlParams = new URLSearchParams(window.location.search);
        const viewType = urlParams.get('view') || 'launcher';

        if (viewType === 'launcher') {
            document.getElementById('launcher-view').style.display = 'block';

            document.getElementById('btn-launch').addEventListener('click', () => {
                const gameType = document.getElementById('game-type').value;
                const players = document.getElementById('player-list').value.split(',').map(p => p.trim());
                ipcRenderer.send('initialize-engine', { gameType, players });
            });
        } else {
            document.getElementById('game-view').style.display = 'block';


            const engineScripts = [
                '/public/assets/deps.js', 
                '/public/assets/main.js', 
                '/public/assets/g_1830.js'
            ];
            
            let loadedScriptsCount = 0;
            function sequenceEngineScripts() {
                if (loadedScriptsCount < engineScripts.length) {
                    const script = document.createElement('script');
                    script.src = engineScripts[loadedScriptsCount];
                    script.onload = () => {
                        loadedScriptsCount++;
                        sequenceEngineScripts();
                    };
                    document.body.appendChild(script);
                } else {
                    initializeOpalConsole();
                }
            }

            function initializeOpalConsole() {
                console.log("[Console Bootstrap] Ingesting shared game configuration payload natively via HTTP stream...");
                fetch('http://localhost:8085/desktop-shell/src/current_game_state.json')
                    .then(res => res.json())
                    .then(gameState => {
                        // Seed local storage parameters across all routing matching keys evaluated by GameManager
                        const stateString = JSON.stringify(gameState);
                        window.localStorage.setItem('hs_tournament_game', stateString);
                        window.localStorage.setItem('game_hs_tournament_game', stateString);
                        window.localStorage.setItem('1835/hs_tournament_game', stateString);
                        window.localStorage.setItem('game_1835/hs_tournament_game', stateString);

                        // Parse game state via Opal JSON so its internal elements are pristine Ruby structures
                        const rubyGameData = Opal.JSON.$parse(stateString);


                        // Sanitize the path so the internal Ruby router sees exactly what it expects on the web
                        const cleanAppRoute = window.location.pathname.replace('/1830/', '/');

                        const bootstrapArgs = {
                            app_route: cleanAppRoute,
                            production: true,
                            game_data: rubyGameData
                        };

                        console.log("[Console Debug] Attaching Opal engine application view context...");
                        // Re-add the target element container ID, explicitly converting the options into a Ruby Hash
                        Opal.App.$attach('app', Opal.hash(bootstrapArgs));

                        console.log("[Console Debug] Opal engine attached successfully.");

                        setTimeout(() => {
                            const loader = document.getElementById('loading-screen');
                            if (loader) loader.style.opacity = '0';
                            setTimeout(() => { if (loader) loader.remove(); }, 300);
                        }, 600);

                        const targetTabName = viewType === 'Timeline' ? 'Info' : (viewType === 'Ledger' ? 'Tools' : viewType);
                        const tabSteeringInterval = setInterval(() => {
                            const links = document.getElementsByTagName('a');
                            for (let i = 0; i < links.length; i++) {
                                if (links[i].textContent.trim() === targetTabName) {
                                    console.log(`[Automation] Directing window instance to the identical ${targetTabName} view component.`);
                                    links[i].click();
                                    clearInterval(tabSteeringInterval);
                                    break;
                                }
                            }
                        }, 100);

                        setTimeout(() => clearInterval(tabSteeringInterval), 5000);
                    })
                    .catch(err => {
                        console.error("[Console Bootstrap Failure]: Fetch routine failed", err);
                    });
            }

            sequenceEngineScripts();
        }
    </script>
</body>
</html>
