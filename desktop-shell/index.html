<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18xx Tournament Command Center</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --text-color: #cdd6f4;
            --accent-color: #89b4fa;
            --panel-bg: #313244;
            --border-color: #45475a;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }
        .view-panel { display: none; }
        .active-view { display: block; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            text-align: left;
        }
        th { background-color: var(--panel-bg); color: var(--accent-color); }
    </style>
</head>
<body>
    <div id="view-map" class="view-panel">
        <h2>Map Console</h2>
        <div id="map-content"></div>
    </div>

    <div id="view-timeline" class="view-panel">
        <h2>Timeline & Phase Metrics</h2>
        <div id="timeline-content"></div>
    </div>

    <div id="view-market" class="view-panel">
        <h2>Stock Market Console</h2>
        <div id="market-content"></div>
    </div>

    <div id="view-ledger" class="view-panel">
        <h2>Ledger & Financial Accounting</h2>
        <div id="ledger-content"></div>
    </div>
</body>
</html>
