# Cap Redis so a flood of distinct cache keys can't grow it unbounded and OOM the
# box (Redis shares the host with Postgres and the app, and there is no swap).
# volatile-lru evicts the least-recently-used keys that have a TTL -- our caches
# are all TTL'd, so under pressure the cold, write-once cache entries go first and
# the actively-used MessageBus keys are left alone.
maxmemory 256mb
maxmemory-policy volatile-lru
